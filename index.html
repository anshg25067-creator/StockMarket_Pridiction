<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./main.css">
</head>
<body>
  <div class="header">
    <div class="logo">StockPred</div>

      <a href="#">Predictions</a>

  </div>

  <section class="results">
    <h2 id="title"></h2>

  </section>
